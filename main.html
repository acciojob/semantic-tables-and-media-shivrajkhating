<!DOCTYPE html>
<html lang="en">
<head>
    <title>Semantic Tables and Media</title>
</head>
<body>

    <!-- Semantic Table -->
    <table border="1">
        <thead>
            <tr>
                <th>Roll Number</th>
                <th>Name</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Rahul</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Shivraj</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Aman</td>
            </tr>
        </tbody>
    </table>

    <!-- Required Heading -->
    <h2>List of medias</h2>

    <!-- Ordered List with Media -->
    <ol>
        <!-- 1. Image -->
        <li>
            <img src="https://picsum.photos/id/123/200/300" 
                 alt="Random Image from Picsum" 
                 width="200">
        </li>

        <!-- 2. Video -->
        <li>
            <video width="320" controls>
                <source src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" 
                        type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </li>

        <!-- 3. Audio -->
        <li>
            <audio controls>
                <source src="http://commondatastorage.googleapis.com/codeskulptor-assets/Epoq-Lepidoptera.ogg" 
                        type="audio/ogg">
                Your browser does not support the audio element.
            </audio>
        </li>
    </ol>

</body>
</html>
